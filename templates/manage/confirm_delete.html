{% extends 'base.html' %}
{% block title %}确认删除{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="chart-container text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem"></i>
                <h5 class="mt-3">确认删除这条{{ type }}？</h5>
                <p class="text-muted">{{ obj }}</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> 确认删除</button>
                    <a href="{% url 'data_center' %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
