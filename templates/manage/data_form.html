{% extends 'base.html' %}
{% block title %}{{ action }} - 数据管理{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="chart-container">
                <div class="chart-title"><i class="bi {% if '城市' in action %}bi-building{% else %}bi-cloud-sun{% endif %}"></i> {{ action }}</div>
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-2">
                        {% for field in form %}
                        <div class="{% if field.name == 'city' or field.name == 'date' %}col-md-4{% elif field.name == 'name' or field.name == 'province' %}col-md-6{% else %}col-md-3{% endif %} mb-2">
                            <label class="form-label small mb-0">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                        </div>
                        {% endfor %}
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                        <a href="{% url 'data_center' %}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
